openapi: "3.1.0"
info:
  title: hbs-queue
  description: HostBill Queue Service - orchestrates tenant onboarding/offboarding workflows.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /ready:
    get:
      summary: Readiness probe
      description: Returns 200 when the service can accept traffic. Pings the database on every request.
      operationId: getReady
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Service is not ready (database unreachable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /health:
    get:
      summary: Health check
      description: Returns build info and database status for diagnostics.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/echo:
    post:
      summary: Echo
      description: Echoes the message back. Demonstrates the full request lifecycle (decode, validate, respond).
      operationId: postEcho
      security:
        - apiKey: []
      parameters:
        - name: X-Request-ID
          in: header
          description: Optional trace ID. If omitted, the server generates one.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EchoRequest"
      responses:
        "200":
          description: Message echoed.
          headers:
            X-Request-ID:
              description: Request trace ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EchoResponse"
        "400":
          description: Malformed JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/script/onboard-org:
    post:
      summary: Onboard organization
      description: |
        Enqueues a tenant onboarding workflow. Called by HostBill's Script
        Provisioner when a new VCD tenant order is created.

        Flow: validate request → look up org in VCD → enqueue River job → return 202.
      operationId: postOnboardOrg
      security:
        - apiKey: []
      parameters:
        - name: X-Request-ID
          in: header
          description: Optional trace ID. If omitted, the server generates one.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardOrgRequest"
      responses:
        "202":
          description: Job enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "400":
          description: Malformed JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: VCD lookup failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: VCD client not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header

  schemas:
    ReadyResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    HealthResponse:
      type: object
      required: [status, version, commit, build_time, database]
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: v0.1.0
        commit:
          type: string
          example: 4c90260
        build_time:
          type: string
          example: "2026-03-14T00:01:30Z"
        database:
          type: string
          enum: [up, down]
          example: up

    EchoRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
          example: hello

    EchoResponse:
      type: object
      required: [echo, request_id]
      properties:
        echo:
          type: string
          example: hello
        request_id:
          type: string
          example: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6

    OnboardOrgRequest:
      type: object
      required: [crm_id, client_first_name, client_last_name, client_email, account_id, bandwidth]
      properties:
        crm_id:
          type: string
          description: HostBill client ID, used to look up the VCD organization.
          example: "167"
        organization_name:
          type: string
          example: AcmeCorp
        client_username:
          type: string
          example: testuser
        client_first_name:
          type: string
          example: Test
        client_last_name:
          type: string
          example: User
        client_email:
          type: string
          format: email
          example: test@example.com
        account_id:
          type: integer
          minimum: 1
          example: 1
        country:
          type: string
          example: US
        state:
          type: string
          example: TX
        postal_code:
          type: string
          example: "75001"
        max_zerto_storage:
          type: integer
          minimum: 0
          example: 0
        max_zerto_vms:
          type: integer
          minimum: 0
          example: 0
        bandwidth:
          type: string
          example: "100"
        product_id:
          type: string
          example: ""

    JobAcceptedResponse:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: integer
          format: int64
          example: 1
        workflow_id:
          type: string
          description: Set once the worker creates the workflow_state row.
          example: ""

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: validation failed
        problems:
          type: object
          additionalProperties:
            type: string
          example:
            message: required
